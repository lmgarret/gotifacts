name: Bug report
description: Report a defect in gotifacts
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, requests, or config that trigger the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gotifacts version / image tag
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Reverse proxy (nginx/Caddy/other), deployment method, relevant env vars (redact secrets).
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Never paste API keys or identity headers.
      render: shell
