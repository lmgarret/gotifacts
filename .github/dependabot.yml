version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      gomod:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
