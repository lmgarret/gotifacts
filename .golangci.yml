version: "2"

linters:
  default: standard
  enable:
    - gocyclo
    - godot
    - misspell
    - noctx
    - revive
    - unconvert
    - errorlint
  settings:
    gocyclo:
      min-complexity: 20
    godot:
      scope: declarations
      capital: false
  exclusions:
    paths:
      - web/node_modules
      - web/dist

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
