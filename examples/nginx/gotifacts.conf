# ============================================================================
# Illustrative nginx config for gotifacts. NOT prescriptive — adapt to your
# TLS setup and SSO provider (Authelia, oauth2-proxy, Keycloak gatekeeper, …).
#
# Key ideas:
#   * apex "/" and "/api/*"  -> forward-auth ON; inject the identity header
#   * apex "/ingest/*"       -> forward-auth OFF; API-key guarded by gotifacts
#   * MCP (optional, if GOTIFACTS_MCP_ENABLED):
#       - "/mcp/oauth/authorize"          -> forward-auth ON  (browser consent)
#       - "/mcp", "/mcp/oauth/token",
#         "/mcp/oauth/register",
#         "/.well-known/oauth-*"          -> forward-auth OFF (OAuth-guarded)
#   * *.<base> / *.*.<base>  -> serve site content + frame-ancestors header
#   * ALWAYS strip any client-supplied identity header before injecting it
#   * gotifacts must see nginx's IP in GOTIFACTS_TRUSTED_PROXIES
# ============================================================================

# Replace with your base domain and the gotifacts upstream address.
upstream gotifacts {
    server gotifacts:8080;
}

# --- SSO subrequest endpoint (example: oauth2-proxy / Authelia) -------------
# This block proxies the /auth subrequest used by auth_request below.
# Point it at your real auth provider.
server {
    listen 127.0.0.1:9091;
    location = /auth {
        proxy_pass http://your-sso-backend:9091/api/verify;
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    }
}

# === Apex: portal (/) + management API (/api) + ingest (/ingest) ============
server {
    listen 443 ssl;
    http2 on;
    server_name example.com;            # <-- your base domain

    ssl_certificate     /etc/ssl/certs/example.com.crt;
    ssl_certificate_key /etc/ssl/private/example.com.key;

    # SECURITY: never trust a client-supplied identity header. Strip it on the
    # way in so only nginx (after auth) can set it.
    proxy_set_header Remote-User "";

    # --- Ingest plane: forward-auth OFF (API key enforced by gotifacts) -----
    location /ingest/ {
        client_max_body_size 64m;
        proxy_pass http://gotifacts;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # Do NOT run auth_request here and do NOT set Remote-User.
        proxy_set_header Remote-User "";
    }

    # --- MCP machine plane: forward-auth OFF (OAuth enforced by gotifacts) ---
    # Only present if GOTIFACTS_MCP_ENABLED. These are called server-to-server
    # by the MCP client (Claude), so they must NOT be behind SSO. The browser
    # consent endpoint /mcp/oauth/authorize is deliberately NOT matched here and
    # falls through to the forward-auth "location /" block below.
    #
    # The regex matches: /mcp exactly, the two discovery documents, and the
    # token/register endpoints — but not /mcp/oauth/authorize.
    location ~ ^/(mcp$|\.well-known/oauth-(protected-resource|authorization-server)$|mcp/oauth/(token|register)$) {
        proxy_pass http://gotifacts;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Remote-User "";
        # Streamable HTTP may use long-lived SSE responses.
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    # --- Management plane: forward-auth ON -----------------------------------
    # Also covers /mcp/oauth/authorize: the OAuth consent screen is a browser
    # redirect and is authenticated by SSO, exactly like the portal.
    location / {
        auth_request /auth;
        # Capture the authenticated user from the SSO response and re-inject it
        # under the header gotifacts expects (GOTIFACTS_FORWARD_AUTH_HEADER).
        auth_request_set $authed_user $upstream_http_remote_user;

        proxy_pass http://gotifacts;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Remote-User $authed_user;
    }

    # Internal SSO verification subrequest.
    location = /auth {
        internal;
        proxy_pass http://127.0.0.1:9091/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }
}

# === Site content: *.<base> and *.*.<base> (and deeper) =====================
server {
    listen 443 ssl;
    http2 on;
    # Wildcards cover one and two label levels; add more as needed.
    server_name ~^(?<sub>.+)\.example\.com$;

    ssl_certificate     /etc/ssl/certs/wildcard.example.com.crt;     # wildcard / SAN cert
    ssl_certificate_key /etc/ssl/private/wildcard.example.com.key;

    location / {
        proxy_pass http://gotifacts;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        # No auth on site content. Strip any identity header regardless.
        proxy_set_header Remote-User "";

        # Allow these sites to be framed by the portal's live thumbnails.
        # gotifacts serves the files; nginx adds the framing policy here.
        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "frame-ancestors https://example.com" always;
    }
}
